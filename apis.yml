aid: looksrare
url: https://raw.githubusercontent.com/api-evangelist/looksrare/refs/heads/main/apis.yml
name: LooksRare
kind: company
description: >-
  LooksRare is a community-first NFT marketplace built on Ethereum that rewards
  traders, collectors, and creators with LOOKS token incentives. The platform
  operates an off-chain order book with on-chain settlement via the LooksRare
  V2 protocol (and Seaport integration), supporting standard and collection-wide
  orders for ERC-721 and ERC-1155 tokens. The public REST API exposes read and
  write access to orders, events (listings, sales, offers, cancellations), token
  metadata, and collection data across Ethereum Mainnet and the Sepolia testnet.
  API access is free with attribution; a mainnet API key is required for write
  operations such as order creation.
