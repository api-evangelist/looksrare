apis:
  - aid: looksrare:orders-api
    name: LooksRare Orders API
    description: >-
      Read and write NFT maker orders in the LooksRare V2 off-chain order book.
      GET /v2/orders retrieves asks (listings) and bids (offers) with flexible
      filtering by collection, token ID, signer, status, and strategy (standard
      or collection-wide). POST /v2/orders submits a signed maker order — either
      an ask or a bid — requiring a valid ECDSA signature, nonce values, price
      in wei, and collection/token details. Seaport-compatible endpoints at
      /v2/orders/seaport enable listing and bidding through the Seaport protocol
      while still earning LooksRare rewards and gems.
    humanURL: https://looksrare.dev/reference/getorders
    baseURL: https://api.looksrare.org/api
    tags:
      - Orders
      - NFT
      - Listings
      - Offers
      - Seaport
      - ERC-721
      - ERC-1155
    properties:
      - type: Documentation
        url: https://looksrare.dev/reference/getorders
      - type: Documentation
        title: Create Order Reference
        url: https://looksrare.dev/reference/createorder

  - aid: looksrare:events-api
    name: LooksRare Events API
    description: >-
      Retrieve token and order activity events from the LooksRare marketplace
      including LIST, SALE, OFFER, CANCEL_LIST, and CANCEL_OFFER event types.
      GET /v2/events supports filtering by collection address, token ID, sender
      address, receiver address, and event type, with cursor-based pagination
      (up to 150 results per page). Events are ordered by creation timestamp.
      The legacy /v1/events endpoint covers historical V1 protocol events,
      mints, and transfers. Seaport events are available at /v2/events/seaport.
    humanURL: https://looksrare.dev/reference/getevents
    baseURL: https://api.looksrare.org/api
    tags:
      - Events
      - NFT
      - Activity
      - Sales
      - Listings
      - Seaport
    properties:
      - type: Documentation
        url: https://looksrare.dev/reference/getevents

  - aid: looksrare:tokens-api
    name: LooksRare Tokens API
    description: >-
      Retrieve NFT token metadata including token details, collection
      information, and token attributes for any token indexed by LooksRare.
      GET /v1/tokens accepts a collection contract address and token ID as
      required query parameters and returns the full token record including
      its parent collection metadata and on-chain attribute traits.
    humanURL: https://looksrare.dev/
    baseURL: https://api.looksrare.org/api
    tags:
      - Tokens
      - NFT
      - Metadata
      - Attributes
      - Collections
    properties:
      - type: Documentation
        url: https://looksrare.dev/

  - aid: looksrare:collections-api
    name: LooksRare Collections API
    description: >-
      Retrieve collection-level data for NFT collections indexed on LooksRare.
      Endpoints return Collection objects including logoURI, bannerURI, and
      collection statistics. The /v2/collections/seaport endpoint checks whether
      a specific collection is eligible for trading via the LooksRare Seaport
      integration. Collection data is embedded in token and event responses
      as well as being available directly.
    humanURL: https://looksrare.dev/
    baseURL: https://api.looksrare.org/api
    tags:
      - Collections
      - NFT
      - Metadata
      - Statistics
      - Seaport
    properties:
      - type: Documentation
        url: https://looksrare.dev/

